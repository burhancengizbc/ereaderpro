<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>E-ReaderPro | Dijital Okuma Deneyimi</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none; /* Varsayılan olarak gizli tutuyoruz */
        }
        /* Ekran genişliği 768px ve üzerindeyse (Bilgisayar / Tablet Görünümü) */
        @media (min-width: 768px) {
            #yatay-frame {
                display: block;
            }
        }
        /* Ekran genişliği 767px ve altındaysa (Mobil Telefon Görünümü) */
        @media (max-width: 767px) {
            #dikey-frame {
                display: block;
            }
        }
    </style>
</head>
<body>

    <iframe id="yatay-frame" src="Harita Avı/E-ReaderPro - Yatay.html"></iframe>

    <iframe id="dikey-frame" src="Harita Avı/E-ReaderPro - Dikey.html"></iframe>

</body>
</html>
